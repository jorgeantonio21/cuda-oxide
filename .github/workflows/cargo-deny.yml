---
name: cargo-deny

# Runs as a job of the top-level CI workflow (.github/workflows/ci.yml) on
# push/pull_request, plus a standalone weekly security scan via schedule.
# Concurrency for the CI path is governed by CI's own group.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny
        run: cargo deny check
